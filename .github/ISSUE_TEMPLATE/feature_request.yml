name: Feature request
description: Suggest an improvement for WillowTab
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement. Please describe the user-facing need rather than only an implementation idea.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: Describe the workflow or limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      placeholder: Describe what WillowTab should do.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search
        - Wallpapers
        - Themes and appearance
        - Settings
        - Localization
        - Packaging or release
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context

